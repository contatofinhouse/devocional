<!doctype html>
<html lang="pt-BR">

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtudes Fortes - Meditação, Caráter e Conexão Familiar</title>
    <meta name="description" content="Fortaleça o caráter, as virtudes e a conexão emocional, seja de forma individual ou com seus filhos, através de práticas diárias de virtudes, meditações interativas e reflexões de 15 minutos." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF385C" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado com sucesso!', reg.scope))
            .catch(err => console.warn('Falha ao registrar SW:', err));
        });
      }
    </script>
  </body>
