<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>lecti - app para construir fé e caráter</title>
    <meta name="description" content="Fortaleça a fé, o caráter, a mente e a conexão familiar, seja de forma individual ou com seus filhos, através de práticas diárias de reflexão e meditações guiadas. O app que constrói a fé da sua família." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF385C" />

    <!-- Open Graph / WhatsApp / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="lecti - app para construir fé e caráter" />
    <meta property="og:description" content="Fortaleça a fé, o caráter, a mente e a conexão familiar através de práticas diárias de reflexão e meditações guiadas. O app que constrói a fé da sua família." />
    <meta property="og:image" content="/icon.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="lecti - app para construir fé e caráter" />
    <meta name="twitter:description" content="Fortaleça a fé, o caráter, a mente e a conexão familiar através de práticas diárias de reflexão e meditações guiadas." />
    <meta name="twitter:image" content="/icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado com sucesso!', reg.scope))
            .catch(err => console.warn('Falha ao registrar SW:', err));
        });
      }
    </script>
  </body>
</html>
